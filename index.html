<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOC Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d0d0f; color: #e2e8f0; font-family: sans-serif; }
        .retro-font { font-family: 'Press Start 2P', cursive; }
        .gold-glow { text-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
        .moc-border { border: 1px solid #27272a; }
        .loading-dot { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-3xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="retro-font text-xl text-yellow-500 gold-glow italic">LEADERBOARD</h1>
        </div>

        <div class="bg-[#111113] moc-border rounded-lg overflow-hidden shadow-2xl">
            <div id="status-box" class="p-20 text-center">
                <div class="inline-block w-8 h-8 border-2 border-yellow-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="retro-font text-[10px] text-zinc-500 uppercase tracking-[0.2em]">
                    Reading Ledger<span class="loading-dot">...</span>
                </p>
                <div id="retry-btn" class="hidden mt-6">
                    <button onclick="fetchData()" class="px-4 py-2 bg-yellow-600 text-black text-[10px] retro-font hover:bg-yellow-500 transition">
                        Force Manual Sync
                    </button>
                    <p class="text-[10px] text-zinc-600 mt-4 italic">Check Console (F12) for Network Errors</p>
                </div>
            </div>

            <table id="leaderboard-table" class="w-full text-left hidden">
                <thead class="bg-black text-yellow-600 text-[10px] uppercase">
                    <tr>
                        <th class="px-6 py-4">Rank</th>
                        <th class="px-6 py-4">Player</th>
                        <th class="px-6 py-4">Level</th>
                        <th class="px-6 py-4 text-right">EXP</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body" class="divide-y divide-zinc-900 text-sm italic">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // We use an alternative "allorigins" URL which is often more reliable
        const TARGET_URL = 'https://play.mirageonlineclassic.com/leaderboard.json';
        const PROXY_URL = `https://api.allorigins.win/get?url=${encodeURIComponent(TARGET_URL)}&_=${new Date().getTime()}`;

        // Show retry button if it takes too long
        setTimeout(() => {
            if (document.getElementById('leaderboard-table').classList.contains('hidden')) {
                document.getElementById('retry-btn').classList.remove('hidden');
            }
        }, 5000);

        async function fetchData() {
            const table = document.getElementById('leaderboard-table');
            const statusBox = document.getElementById('status-box');
            const tbody = document.getElementById('leaderboard-body');

            try {
                console.log("Attempting to fetch from:", PROXY_URL);
                const response = await fetch(PROXY_URL);
                
                if (!response.ok) throw new Error("Proxy connection failed.");
                
                const wrapper = await response.json();
                
                // Important: AllOrigins returns the data as a string in .contents
                const data = JSON.parse(wrapper.contents);
                console.log("Data successfully parsed:", data);

                // Sort by level (highest to lowest)
                data.sort((a, b) => (b.level || 0) - (a.level || 0));

                tbody.innerHTML = '';
                data.forEach((player, index) => {
                    const row = `
                        <tr class="hover:bg-zinc-800/30">
                            <td class="px-6 py-4 font-mono ${index < 3 ? 'text-yellow-500 font-bold' : 'text-zinc-600'}">
                                #${index + 1}
                            </td>
                            <td class="px-6 py-4 font-bold text-zinc-100">
                                ${player.name || player.username || "Unknown"}
                            </td>
                            <td class="px-6 py-4">
                                <span class="text-yellow-700 font-bold">LV.${player.level || 0}</span>
                            </td>
                            <td class="px-6 py-4 text-right font-mono text-zinc-500 text-xs uppercase">
                                ${(player.exp || 0).toLocaleString()}
                            </td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });

                statusBox.classList.add('hidden');
                table.classList.remove('hidden');

            } catch (err) {
                console.error("Fetch error:", err);
                alert("Could not load leaderboard. This is likely due to a CORS restriction between your browser and the game server. Check the F12 console for details.");
            }
        }

        // Run on start
        fetchData();
    </script>
</body>
</html>
