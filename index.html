<!DOCTYPE html>

    <title>Mirage Online Classic - Global Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #09090b; 
            color: #f4f4f5; 
            font-family: ui-sans-serif, system-ui, sans-serif;
        }
        .retro-font { font-family: 'Press Start 2P', cursive; }
        .gold-border { border-color: #ca8a04; }
        .row-hover:hover { background-color: rgba(250, 204, 21, 0.05); }
        
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ca8a04; }
    </style>
</head>
<body class="p-4 sm:p-10 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900 via-zinc-950 to-black min-h-screen">

    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="retro-font text-2xl md:text-3xl text-yellow-500 mb-3 drop-shadow-[0_0_8px_rgba(234,179,8,0.4)]">
                HALL OF FAME
            </h1>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.4em]">Mirage Online Classic Rankings</p>
        </div>

        <div class="bg-zinc-900/50 border border-zinc-800 rounded-2xl shadow-2xl overflow-hidden backdrop-blur-sm">
            
            <div id="loading-overlay" class="py-24 text-center">
                <div class="inline-block w-10 h-10 border-2 border-yellow-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="retro-font text-[10px] text-zinc-600">Connecting to Game Server...</p>
            </div>

            <div id="error-display" class="hidden py-20 text-center px-6">
                <p class="text-red-500 font-bold mb-2">Access Denied</p>
                <p class="text-zinc-400 text-sm mb-6">The game server is preventing this external site from reading the leaderboard data (CORS Error).</p>
                <button onclick="location.reload()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 text-white text-xs uppercase transition rounded-lg border border-zinc-700">Try Again</button>
            </div>

            <table id="leaderboard-table" class="w-full text-left hidden">
                <thead class="bg-zinc-950/50 text-yellow-600 text-[10px] uppercase tracking-widest font-black">
                    <tr>
                        <th class="px-6 py-5">Rank</th>
                        <th class="px-6 py-5">Adventurer</th>
                        <th class="px-6 py-5">Level</th>
                        <th class="px-6 py-5 text-right">Experience</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-content" class="divide-y divide-zinc-800/50 text-sm">
                    </tbody>
            </table>
        </div>

        <div class="mt-8 text-center flex flex-col items-center gap-4">
            <div class="h-px w-24 bg-zinc-800"></div>
            <p class="text-zinc-600 text-[10px] uppercase">World Designer: Data Live Sync</p>
        </div>
    </div>

         */
        const JSON_URL = 'https://play.mirageonlineclassic.com/leaderboard.json';
