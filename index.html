<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirage Online Classic - Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d0d0f; color: #e2e8f0; font-family: sans-serif; }
        .retro-font { font-family: 'Press Start 2P', cursive; }
        .gold-glow { text-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
        tr:nth-child(even) { background-color: rgba(255, 255, 255, 0.02); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="retro-font text-2xl text-yellow-500 mb-2 gold-glow">HALL OF FAME</h1>
            <p class="text-gray-500 text-sm tracking-widest">MIRAGE ONLINE CLASSIC</p>
        </header>

        <div class="bg-gray-900 border border-gray-800 rounded-lg overflow-hidden shadow-2xl">
            <div id="status-message" class="p-20 text-center">
                <p class="retro-font text-xs animate-pulse text-yellow-600">Accessing Game Database...</p>
            </div>

            <table id="leaderboard-table" class="w-full text-left hidden">
                <thead class="bg-gray-800 text-yellow-500 text-xs uppercase">
                    <tr>
                        <th class="px-6 py-4">Rank</th>
                        <th class="px-6 py-4">Adventurer</th>
                        <th class="px-6 py-4">Level</th>
                        <th class="px-6 py-4 text-right">Experience</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body" class="text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Using a CORS proxy to allow the browser to fetch the JSON from your game server
        const TARGET_URL = 'https://play.mirageonlineclassic.com/leaderboard.json';
        const PROXY_URL = 'https://api.allorigins.win/get?url=' + encodeURIComponent(TARGET_URL);

        async function loadData() {
            const status = document.getElementById('status-message');
            const table = document.getElementById('leaderboard-table');
            const tbody = document.getElementById('leaderboard-body');

            try {
                const response = await fetch(PROXY_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const wrapper = await response.json();
                // AllOrigins wraps the result in a 'contents' string, so we parse it
                const data = JSON.parse(wrapper.contents);
                
                // Debug: This helps us see the exact keys in your JSON (n, v, level, etc.)
                console.log("Leaderboard Data Loaded:", data);

                // Sort by level descending
                data.sort((a, b) => (b.level || 0) - (a.level || 0));

                tbody.innerHTML = '';
                data.forEach((player, index) => {
                    const row = `
                        <tr class="border-b border-gray-800 hover:bg-gray-800/50 transition-colors">
                            <td class="px-6 py-4 font-mono ${index < 3 ? 'text-yellow-500' : 'text-gray-500'}">
                                #${index + 1}
                            </td>
                            <td class="px-6 py-4 font-bold text-gray-200">
                                ${player.name || player.username || 'Unknown'}
                            </td>
                            <td class="px-6 py-4">
                                <span class="bg-blue-900/30 text-blue-400 border border-blue-800 px-2 py-0.5 rounded text-xs">
                                    Lv. ${player.level || 0}
                                </span>
                            </td>
                            <td class="px-6 py-4 text-right font-mono text-gray-400">
                                ${(player.exp || 0).toLocaleString()}
                            </td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });

                status.classList.add('hidden');
                table.classList.remove('hidden');

            } catch (error) {
                console.error("Fetch Error:", error);
                status.innerHTML = `
                    <p class="text-red-500 retro-font text-xs">Error: Connection Failed</p>
                    <p class="text-gray-600 text-xs mt-4">Check console for details</p>
                `;
            }
        }

        loadData();
    </script>
</body>
</html>
