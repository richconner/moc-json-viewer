<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirage Online Classic - Global Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0c0c0e; color: #e4e4e7; font-family: sans-serif; }
        .retro-font { font-family: 'Press Start 2P', cursive; }
        .gold-glow { text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }
        .loading-bar {
            height: 2px;
            background: #ca8a04;
            width: 0%;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-4xl mx-auto mt-10">
        <header class="text-center mb-10">
            <h1 class="retro-font text-2xl text-yellow-500 mb-2 gold-glow">RANKINGS</h1>
            <p class="text-zinc-500 text-[10px] tracking-widest uppercase">Mirage Online Classic</p>
        </header>

        <div class="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden shadow-2xl">
            <div id="progress" class="loading-bar"></div>

            <div id="status-area" class="p-20 text-center">
                <div id="spinner" class="inline-block w-8 h-8 border-2 border-yellow-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p id="status-text" class="retro-font text-[10px] text-zinc-500">Initializing Connection...</p>
                <div id="debug-log" class="mt-4 text-xs font-mono text-zinc-600 max-w-xs mx-auto text-left"></div>
            </div>

            <table id="leaderboard-table" class="w-full text-left hidden">
                <thead class="bg-zinc-950 text-yellow-600 text-[10px] uppercase">
                    <tr>
                        <th class="px-6 py-4">Rank</th>
                        <th class="px-6 py-4">Player</th>
                        <th class="px-6 py-4">Level</th>
                        <th class="px-6 py-4 text-right">Experience</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body" class="divide-y divide-zinc-800 text-sm"></tbody>
            </table>
        </div>
    </div>

    <script>
        const TARGET = 'https://play.mirageonlineclassic.com/leaderboard.json';
        
        // We will try multiple proxies in case one is down
        const PROXIES = [
            (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&ts=${Date.now()}`,
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`
        ];

        let currentProxyIndex = 0;

        function log(msg) {
            console.log(msg);
            const logDiv = document.getElementById('debug-log');
            logDiv.innerHTML += `> ${msg}<br>`;
        }

        async function attemptFetch() {
            const statusText = document.getElementById('status-text');
            const progress = document.getElementById('progress');
            
            try {
                const proxyUrl = PROXIES[currentProxyIndex](TARGET);
                log(`Trying Proxy ${currentProxyIndex + 1}...`);
                progress.style.width = currentProxyIndex === 0 ? "30%" : "60%";

                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Server response failed");

                const json = await response.json();
                
                // AllOrigins wraps data in .contents, corsproxy.io does not.
                let rawData = json.contents ? JSON.parse(json.contents) : json;

                log("Data received! Processing...");
                progress.style.width = "100%";
                renderData(rawData);

            } catch (err) {
                log(`Proxy ${currentProxyIndex + 1} failed.`);
                currentProxyIndex++;
                
                if (currentProxyIndex < PROXIES.length) {
                    setTimeout(attemptFetch, 1000); // Try next proxy
                } else {
                    showError();
                }
            }
        }

        function renderData(data) {
            const tbody = document.getElementById('leaderboard-body');
            const table = document.getElementById('leaderboard-table');
            const statusArea = document.getElementById('status-area');

            // Handle both Array and Object formats
            const players = Array.isArray(data) ? data : (data.players || []);
            
            // Sort by level
            players.sort((a, b) => (b.level || 0) - (a.level || 0));

            tbody.innerHTML = '';
            players.forEach((p, i) => {
                const row = `
                    <tr class="hover:bg-white/[0.02]">
                        <td class="px-6 py-4 font-mono ${i < 3 ? 'text-yellow-500' : 'text-zinc-600'}">#${i + 1}</td>
                        <td class="px-6 py-4 font-bold">${p.name || p.username || 'Unknown'}</td>
                        <td class="px-6 py-4"><span class="bg-zinc-800 px-2 py-1 rounded text-xs text-yellow-500">Lv ${p.level || 0}</span></td>
                        <td class="px-6 py-4 text-right font-mono text-zinc-500">${(p.exp || 0).toLocaleString()}</td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });

            statusArea.classList.add('hidden');
            table.classList.remove('hidden');
        }

        function showError() {
            document.getElementById('spinner').classList.add('hidden');
            document.getElementById('status-text').innerText = "CONNECTION FAILED";
            document.getElementById('status-text').classList.add('text-red-500');
            log("CORS blocked all requests. Server config update required.");
        }

        window.onload = attemptFetch;
    </script>
</body>
</html>
