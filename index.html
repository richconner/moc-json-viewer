<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirage Online Classic - Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0c; color: #d4d4d8; font-family: 'Inter', sans-serif; }
        .retro-font { font-family: 'Press Start 2P', cursive; }
        .gold-text { color: #fbbf24; text-shadow: 0 0 8px rgba(251, 191, 36, 0.3); }
        .moc-card { background: #111114; border: 1px solid #1f1f23; }
        tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="retro-font text-2xl gold-text mb-2 italic">LEADERBOARD</h1>
            <p class="text-zinc-500 text-[10px] tracking-[0.3em] uppercase font-bold">Mirage Online Classic</p>
        </header>

        <div class="moc-card rounded-xl overflow-hidden shadow-2xl">
            <div id="status-container" class="p-16 text-center">
                <div id="loader" class="inline-block w-8 h-8 border-2 border-yellow-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p id="status-msg" class="retro-font text-[10px] text-zinc-500 uppercase tracking-widest">Reading Ledger...</p>
            </div>

            <table id="main-table" class="w-full text-left hidden">
                <thead class="bg-black/40 text-yellow-500 text-[10px] uppercase tracking-wider font-black">
                    <tr>
                        <th class="px-6 py-5">Rank</th>
                        <th class="px-6 py-5">Player</th>
                        <th class="px-6 py-5">Level</th>
                        <th class="px-6 py-5 text-right">Experience</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="text-sm"></tbody>
            </table>
        </div>

        <div id="debug-panel" class="mt-8 hidden p-4 bg-red-900/10 border border-red-900/30 rounded-lg text-xs font-mono text-red-400">
            <p class="font-bold mb-2 uppercase">Developer Debug Log:</p>
            <div id="debug-content"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://play.mirageonlineclassic.com/leaderboard.json';
        // Using a reliable, fast proxy with no wrapping
        const PROXY = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);

        async function init() {
            const status = document.getElementById('status-msg');
            const debugPanel = document.getElementById('debug-panel');
            const debugContent = document.getElementById('debug-content');

            try {
                const response = await fetch(PROXY);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                // DATA CLEANING: Handle different JSON structures automatically
                let players = Array.isArray(data) ? data : (data.players || Object.values(data));
                
                // If the data is empty or malformed
                if (!players || players.length === 0) {
                    throw new Error("JSON loaded, but no player array found.");
                }

                render(players);

            } catch (err) {
                console.error(err);
                document.getElementById('loader').classList.add('hidden');
                status.innerText = "FAILED TO MAP DATA";
                status.classList.add('text-red-500');
                
                debugPanel.classList.remove('hidden');
                debugContent.innerText = `Error: ${err.message}\nCheck if the JSON structure has changed.`;
            }
        }

        function render(players) {
            const tbody = document.getElementById('table-body');
            const table = document.getElementById('main-table');
            const container = document.getElementById('status-container');

            // Find property names dynamically (case-insensitive)
            // This prevents "Empty Table" if your keys are "Name" instead of "name"
            const getVal = (obj, keys) => {
                const found = Object.keys(obj).find(k => keys.includes(k.toLowerCase()));
                return found ? obj[found] : null;
            };

            // Sort by Level or Exp
            players.sort((a, b) => {
                const lvA = getVal(a, ['level', 'lv', 'l']) || 0;
                const lvB = getVal(b, ['level', 'lv', 'l']) || 0;
                return lvB - lvA;
            });

            tbody.innerHTML = '';
            players.forEach((p, i) => {
                const name = getVal(p, ['name', 'username', 'n', 'player']) || 'Unknown';
                const level = getVal(p, ['level', 'lv', 'l']) || 0;
                const exp = getVal(p, ['exp', 'experience', 'v', 'xp']) || 0;

                const row = `
                    <tr class="border-b border-white/5 hover:bg-yellow-500/5 transition-colors">
                        <td class="px-6 py-4 font-mono ${i < 3 ? 'text-yellow-500 font-bold' : 'text-zinc-600'}">
                            #${(i + 1).toString().padStart(2, '0')}
                        </td>
                        <td class="px-6 py-4 font-bold text-zinc-200">${name}</td>
                        <td class="px-6 py-4 text-yellow-600 font-mono">
