
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirage Online Classic — Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0010;
    --bg2:       #0d0018;
    --panel:     #110022;
    --panel2:    #160030;
    --magenta:   #ff00ff;
    --cyan:      #00ffff;
    --pink:      #ff2d78;
    --violet:    #bf00ff;
    --yellow:    #ffe600;
    --text:      #f0e6ff;
    --text-dim:  #9970cc;
    --text-faint:#4a2d6e;
    --border-m:  rgba(255,0,255,0.3);
    --border-c:  rgba(0,255,255,0.2);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .bg-grid::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 55vh;
    background-image:
      linear-gradient(rgba(255,0,255,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,0,255,0.18) 1px, transparent 1px);
    background-size: 60px 60px;
    transform: perspective(600px) rotateX(70deg);
    transform-origin: bottom center;
    mask-image: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
  }

  .bg-grid::after {
    content: '';
    position: absolute;
    bottom: 28%;
    left: 50%;
    transform: translateX(-50%);
    width: 120%;
    height: 40%;
    background: radial-gradient(ellipse at center bottom,
      rgba(191,0,255,0.28) 0%,
      rgba(255,0,255,0.1) 35%,
      transparent 70%
    );
    filter: blur(24px);
  }

  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
  }

  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,10,0.75) 100%);
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 3.5rem 1rem 2.5rem;
    border-bottom: 1px solid var(--border-m);
    box-shadow: 0 1px 0 rgba(255,0,255,0.08), 0 2px 40px rgba(255,0,255,0.05);
  }

  .logo-icon {
    font-size: 2.8rem;
    display: block;
    margin-bottom: 0.5rem;
    animation: iconFloat 4s ease-in-out infinite;
    filter: drop-shadow(0 0 18px var(--magenta));
  }
  @keyframes iconFloat {
    0%,100% { transform: translateY(0) scale(1); }
    50%      { transform: translateY(-8px) scale(1.06); }
  }

  .game-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(1.4rem, 5vw, 3.2rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #fff;
    text-shadow:
      0 0 7px #fff,
      0 0 14px #fff,
      0 0 30px var(--magenta),
      0 0 60px var(--magenta),
      0 0 100px var(--violet);
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%,95%,97%,99%,100% {
      text-shadow:
        0 0 7px #fff, 0 0 14px #fff,
        0 0 30px var(--magenta), 0 0 60px var(--magenta),
        0 0 100px var(--violet);
    }
    96%,98% {
      text-shadow:
        0 0 4px #fff,
        0 0 10px var(--magenta),
        0 0 30px var(--violet);
    }
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-top: 0.6rem;
    text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
  }

  .header-line {
    display: flex;
    align-items: center;
    gap: 1rem;
    max-width: 600px;
    margin: 1.5rem auto 0;
    color: var(--magenta);
    font-size: 0.7rem;
    opacity: 0.5;
  }
  .header-line::before, .header-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--magenta), transparent);
  }

  /* ── CONTROLS ── */
  .controls-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(10,0,16,0.93);
    border-bottom: 1px solid var(--border-m);
    backdrop-filter: blur(12px);
    padding: 0.85rem 1rem;
    box-shadow: 0 4px 30px rgba(255,0,255,0.08);
  }

  .dropdowns-row {
    display: flex;
    gap: 1rem;
    max-width: 800px;
    margin: 0 auto;
  }

  .dropdown-col { flex: 1; }

  .dropdown-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 0.3rem;
  }

  .dropdown-wrap { position: relative; }

  .dropdown-wrap select {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    background: var(--panel2);
    border: 1px solid var(--border-m);
    color: var(--magenta);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 0.65rem 2.2rem 0.65rem 1rem;
    border-radius: 2px;
    cursor: pointer;
    outline: none;
    box-shadow: 0 0 10px rgba(255,0,255,0.1), inset 0 0 10px rgba(255,0,255,0.03);
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .dropdown-wrap select:hover,
  .dropdown-wrap select:focus {
    border-color: var(--magenta);
    box-shadow: 0 0 20px rgba(255,0,255,0.3), inset 0 0 10px rgba(255,0,255,0.05);
    color: #fff;
  }

  .dropdown-wrap select option {
    background: #160030;
    color: var(--text);
    font-family: monospace;
  }

  .dropdown-arrow {
    position: absolute;
    right: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--magenta);
    font-size: 0.8rem;
    pointer-events: none;
    text-shadow: 0 0 6px var(--magenta);
  }

  /* ── MAIN ── */
  main {
    position: relative;
    z-index: 2;
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1rem 5rem;
  }

  /* ── LOADING ── */
  .state-panel {
    text-align: center;
    padding: 5rem 2rem;
  }

  .spinner {
    width: 52px; height: 52px;
    border: 2px solid var(--panel2);
    border-top-color: var(--magenta);
    border-right-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1.5rem;
    box-shadow: 0 0 20px var(--magenta);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .state-panel p {
    font-size: 0.82rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--cyan);
    text-shadow: 0 0 10px var(--cyan);
    animation: blink 1.4s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0.25; } }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.2rem;
  }

  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cyan);
    text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
    white-space: nowrap;
  }

  .section-count {
    font-size: 0.7rem;
    color: var(--text-faint);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-c), transparent);
    box-shadow: 0 0 4px rgba(0,255,255,0.3);
  }

  /* ── SEARCH ── */
  .search-wrap { margin-bottom: 1rem; position: relative; }

  .search-wrap input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border-c);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.88rem;
    padding: 0.6rem 1rem 0.6rem 2.2rem;
    border-radius: 2px;
    outline: none;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    box-shadow: inset 0 0 10px rgba(0,255,255,0.04);
  }

  .search-wrap input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 16px rgba(0,255,255,0.2), inset 0 0 10px rgba(0,255,255,0.05);
  }

  .search-wrap input::placeholder { color: var(--text-faint); }
  .search-icon {
    position: absolute;
    left: 0.7rem; top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
    font-size: 0.8rem;
    pointer-events: none;
  }

  /* ── TABLE ── */
  .lb-table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border-m);
    border-radius: 2px;
    background: var(--panel);
    box-shadow:
      0 0 0 1px rgba(255,0,255,0.04),
      0 0 50px rgba(255,0,255,0.06),
      inset 0 0 30px rgba(191,0,255,0.03);
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }

  thead th {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--magenta);
    padding: 0.85rem 1rem;
    text-align: left;
    background: var(--panel2);
    border-bottom: 1px solid var(--border-m);
    white-space: nowrap;
    text-shadow: 0 0 8px var(--magenta);
  }
  thead th:first-child { text-align: center; width: 60px; }

  tbody tr {
    border-bottom: 1px solid rgba(255,0,255,0.07);
    transition: background 0.15s, box-shadow 0.15s;
    animation: rowIn 0.3s ease both;
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  tbody tr:hover {
    background: rgba(255,0,255,0.05);
    box-shadow: inset 3px 0 0 var(--magenta);
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(1) { background: rgba(255,230,0,0.04); }
  tbody tr:nth-child(2) { background: rgba(192,192,255,0.03); }
  tbody tr:nth-child(3) { background: rgba(255,100,0,0.03); }

  td {
    padding: 0.7rem 1rem;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .rank-cell { text-align: center; font-size: 1rem; }
  .rank-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.68rem;
    color: var(--text-faint);
  }

  .name-cell {
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.04em;
  }
  tr:nth-child(1) .name-cell { color: var(--yellow); text-shadow: 0 0 10px rgba(255,230,0,0.5); }
  tr:nth-child(2) .name-cell { color: #c8d8ff; text-shadow: 0 0 8px rgba(180,200,255,0.4); }
  tr:nth-child(3) .name-cell { color: #ffaa55; text-shadow: 0 0 8px rgba(255,140,50,0.4); }

  .num-cell {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.76rem;
    color: var(--cyan);
    text-shadow: 0 0 6px rgba(0,255,255,0.5);
    letter-spacing: 0.04em;
  }

  /* ── META ── */
  .meta-bar {
    text-align: right;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--text-faint);
    margin-top: 1.2rem;
    text-transform: uppercase;
  }

  /* ── ERROR ── */
  .error-box {
    border: 1px solid var(--pink);
    background: rgba(255,45,120,0.08);
    border-radius: 2px;
    padding: 2rem;
    color: var(--pink);
    font-size: 0.88rem;
    text-align: center;
    letter-spacing: 0.1em;
    box-shadow: 0 0 20px rgba(255,45,120,0.15);
  }

  @media (max-width: 600px) {
    .dropdowns-row { flex-direction: column; gap: 0.5rem; }
    td, th { padding: 0.55rem 0.7rem; font-size: 0.78rem; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<header>
  <span class="logo-icon">⚔️</span>
  <h1 class="game-title">Mirage Online Classic</h1>
  <p class="subtitle">// Hall of Champions //</p>
  <div class="header-line">◈</div>
</header>

<div class="controls-bar">
  <div class="dropdowns-row">
    <div class="dropdown-col">
      <div class="dropdown-label">// Category</div>
      <div class="dropdown-wrap">
        <select id="primary-select" autocomplete="off"></select>
        <span class="dropdown-arrow">▾</span>
      </div>
    </div>
    <div class="dropdown-col">
      <div class="dropdown-label">// Leaderboard</div>
      <div class="dropdown-wrap">
        <select id="tabs" autocomplete="off"></select>
        <span class="dropdown-arrow">▾</span>
      </div>
    </div>
  </div>
</div>

<main id="main">
  <div class="state-panel" id="loading">
    <div class="spinner"></div>
    <p>Loading data stream...</p>
  </div>
</main>

<script>
const TARGET = 'https://play.mirageonlineclassic.com/leaderboard.json';
const MEDALS = ['🥇','🥈','🥉'];

let allData    = null;
let currentTab = null;
let searchVal  = '';

function fmt(v) {
  if (v === null || v === undefined) return '—';
  if (typeof v === 'number') return v.toLocaleString();
  return String(v);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function detectColumns(sample) {
  const keys = Object.keys(sample);
  const nameKey  = keys.find(k => typeof sample[k] === 'string') || keys[0];
  const scoreKey = keys.find(k => typeof sample[k] === 'number') || keys[1];
  return { nameKey, scoreKey, allKeys: keys };
}

function renderTable(arr, sectionKey) {
  if (!arr || !arr.length) return '<p style="padding:2rem;text-align:center;color:var(--text-faint);letter-spacing:0.2em;font-size:0.8rem">// NO DATA //</p>';

  const { nameKey, scoreKey, allKeys } = detectColumns(arr[0]);
  const filtered = searchVal
    ? arr.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(searchVal)))
    : arr;

  if (!filtered.length) return '<p style="padding:1.5rem;text-align:center;color:var(--text-faint);letter-spacing:0.15em;font-size:0.8rem">// NO MATCHES //</p>';

  let html = `
    <div class="section-header">
      <span class="section-title">${escHtml(sectionKey)}</span>
      <span class="section-count">[${filtered.length} entries]</span>
      <span class="section-line"></span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">▶</span>
      <input id="search-input" type="text" placeholder="search players..." value="${escHtml(searchVal)}" autocomplete="off">
    </div>
    <div class="lb-table-wrap">
      <table>
        <thead><tr>
          <th>RNK</th>
          ${allKeys.map(k => `<th>${escHtml(k.toUpperCase())}</th>`).join('')}
        </tr></thead>
        <tbody>
  `;

  filtered.forEach((row, i) => {
    const rank = i + 1;
    const rankCell = rank <= 3
      ? `<span class="rank-medal">${MEDALS[rank-1]}</span>`
      : `<span class="rank-num">${String(rank).padStart(3,'0')}</span>`;

    html += `<tr style="animation-delay:${Math.min(i,40)*0.02}s">
      <td class="rank-cell">${rankCell}</td>
      ${allKeys.map(k => {
        const val = row[k];
        const isName  = k === nameKey;
        const isScore = k === scoreKey;
        return `<td class="${isName ? 'name-cell' : isScore ? 'num-cell' : ''}">${escHtml(fmt(val))}</td>`;
      }).join('')}
    </tr>`;
  });

  html += '</tbody></table></div>';
  return html;
}

function renderSection(key, data) {
  if (Array.isArray(data) && data.length > 0 && typeof data[0] === 'object' && data[0] !== null) {
    return renderTable(data, key);
  }
  return `<p style="padding:1rem;color:var(--text-dim)">${escHtml(fmt(data))}</p>`;
}

function groupKeys(data) {
  const groups = {};
  Object.keys(data).forEach(k => {
    let group = 'Other';
    if (/guild/i.test(k))       group = 'Guild';
    else if (/player/i.test(k)) group = 'Player';
    if (!groups[group]) groups[group] = [];
    groups[group].push(k);
  });
  const sorted = {};
  ['Player','Guild','Other'].forEach(g => { if (groups[g]) sorted[g] = groups[g]; });
  return sorted;
}

let groupedData = {};

function buildTabs(data) {
  groupedData = groupKeys(data);
  const primarySel = document.getElementById('primary-select');
  const secondSel  = document.getElementById('tabs');

  const currentGroup = Object.keys(groupedData).find(g =>
    groupedData[g].includes(currentTab)
  ) || Object.keys(groupedData)[0];

  primarySel.innerHTML = Object.keys(groupedData).map(g =>
    `<option value="${escHtml(g)}"${g === currentGroup ? ' selected' : ''}>${escHtml(g)} Leaderboards</option>`
  ).join('');

  function populateSecondary(group) {
    secondSel.innerHTML = (groupedData[group] || []).map(k =>
      `<option value="${escHtml(k)}"${k === currentTab ? ' selected' : ''}>${escHtml(k)}</option>`
    ).join('');
  }

  populateSecondary(currentGroup);

  primarySel.onchange = () => {
    searchVal = '';
    const g = primarySel.value;
    populateSecondary(g);
    currentTab = groupedData[g][0];
    renderMain();
  };

  secondSel.onchange = () => {
    searchVal  = '';
    currentTab = secondSel.value;
    renderMain();
  };
}

function renderMain() {
  const main = document.getElementById('main');
  main.innerHTML = renderSection(currentTab, allData[currentTab]);
  main.innerHTML += `<p class="meta-bar">// data: play.mirageonlineclassic.com · synced ${new Date().toLocaleTimeString()} //</p>`;
  const inp = document.getElementById('search-input');
  if (inp) {
    inp.addEventListener('input', e => {
      searchVal = e.target.value.toLowerCase().trim();
      renderMain();
      const ni = document.getElementById('search-input');
      if (ni) { ni.focus(); ni.setSelectionRange(ni.value.length, ni.value.length); }
    });
  }
}

async function init() {
  try {
    const res = await fetch(TARGET);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.json();
    allData = Array.isArray(raw) ? { leaderboard: raw } : raw;
    const keys = Object.keys(allData);
    if (!keys.length) throw new Error('No leaderboard data found.');
    currentTab = keys[0];
    buildTabs(allData);
    renderMain();
  } catch (err) {
    document.getElementById('main').innerHTML = `
      <div class="error-box">
        &#9888; DATA STREAM ERROR<br>
        <small style="margin-top:0.5rem;display:block;opacity:0.7">${escHtml(err.message)}</small>
      </div>
    `;
  }
}

init();
</script>
</body>
</html>
